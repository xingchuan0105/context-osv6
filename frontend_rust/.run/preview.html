<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Context-OS Frontend Preview</title>
    <link rel="stylesheet" href="/pkg/index.css" />
  </head>
  <body>
    <script type="module">
      import init, { mount } from '/pkg/web_ui.js';
      try {
        await init({ module_or_path: '/pkg/web_ui_bg.wasm' });
        mount();
      } catch (err) {
        console.error('frontend preview bootstrap failed', err);
        const pre = document.createElement('pre');
        pre.style.padding = '16px';
        pre.textContent = String(err);
        document.body.appendChild(pre);
      }
    </script>
  </body>
</html>
