[package]
name = "frontend-web-ui"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true

[lib]
name = "web_ui"
crate-type = ["cdylib", "rlib"]

[dependencies]
web-sdk = { package = "frontend-web-sdk", path = "../web-sdk" }
leptos = { version = "0.8", features = ["nightly"] }
leptos_router = { version = "0.8", features = ["nightly"] }
leptos_meta = { version = "0.8" }
serde.workspace = true
serde_json.workspace = true
serde-wasm-bindgen = "0.6"
anyhow.workspace = true
futures-util.workspace = true
reqwest.workspace = true
urlencoding = "2.1"
js-sys = "0.3"
wasm-bindgen-futures = "0.4"
stylance = "0.7.4"
gloo-timers = { version = "0.3", features = ["futures"] }
chrono = { version = "0.4.42", default-features = false, features = ["clock"] }
web-sys = { version = "0.3", features = ["Window", "Storage", "Document", "Element", "HtmlElement", "HtmlDivElement", "HtmlInputElement", "HtmlAnchorElement", "File", "FileList", "Blob", "Url", "Navigator", "Clipboard", "ResizeObserver", "DomRect"] }
wasm-bindgen = "0.2"
console_error_panic_hook = { version = "0.1", optional = true }

[features]
default = ["ssr"]
hydrate = [
    "leptos/hydrate",
    "dep:console_error_panic_hook",
]
ssr = [
    "leptos/ssr",
    "leptos_router/ssr",
    "leptos_meta/ssr",
]
