mode: search
system_prompt_base: prompts/skills/search-system/SKILL.md
native_tools:
  - name: web_search
    version: "1.0"
    description: "搜索互联网获取实时信息"
    input_schema:
      type: object
      properties:
        query: { type: string }
        vertical:
          type: string
          enum: [web, news]
          default: web
      required: ["query"]
    output_schema:
      type: object
skill_catalog:
  - search-strategy
  - result-validation
  - url-citation-format
disclosure:
  rounds:
    - round_idx: 0
      load: Index
    - round_idx: 1
      load:
        skills:
          - search-strategy
          - result-validation
budget:
  max_iterations: 3
  by_user_tier:
    free: 2
    pro: 3
    enterprise: 3
temperature: 0.5
