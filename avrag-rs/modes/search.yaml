mode: search
system_prompt_base: prompts/orchestrators/search-system.md
tool_pool: [web_search, web_fetch, conversation_history_load, user_profile_load]
inject_retrieval_query: true
skill_catalog:
  retrieve: [search, memory]
  synthesis: [writing, format]
  mandatory_synthesis: [search-answer]
budget:
  max_iterations: 3
  by_user_tier:
    free: 2
    pro: 3
    enterprise: 3
temperature: 0.5
query_normalization:
  enabled: true
  max_prior_turns: 6
  llm_fallback: true
loop_exit:
  require_evidence: true
  allow_content_early_stop: false
  skip_synthesis_on_direct_answer: false
synthesis_output:
  contract: internal_search_answer_v1
auto_fallback:
  enabled: true
  tool_id: web_search
  top_k: 10
  vertical: web
