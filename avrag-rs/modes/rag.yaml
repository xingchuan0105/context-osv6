mode: rag
system_prompt_base: prompts/skills/rag-system/SKILL.md
native_tools:
  - name: dense_retrieval
    version: "1.0"
    description: "基于语义相似度检索文档片段。当需要查找与用户问题语义相关的文档内容时使用。"
    input_schema:
      type: object
      properties:
        queries:
          type: array
          items:
            type: string
          description: "检索查询列表，每个查询应包含用户问题的核心概念"
        modality:
          type: string
          enum: [text, image]
          default: text
          description: "检索模态"
        top_k:
          type: integer
          description: "返回最相关的 N 个片段"
          default: 10
          minimum: 1
          maximum: 50
        doc_scope:
          type: array
          items:
            type: string
          description: "限制检索范围的文档 ID 列表，空表示不限定"
          default: []
      required:
        - queries
    output_schema:
      type: object
skill_catalog:
  - rag-codegen-guide
  - rag-retrieval-strategy
  - rag-citation-format
  - rag-memory-mgmt
  - rag-doc-summary-guide
disclosure:
  rounds:
    - round_idx: 0
      load: Index
    - round_idx: 1
      load:
        skills:
          - rag-codegen-guide
          - rag-retrieval-strategy
    - round_idx: 2
      load: Auto
budget:
  max_iterations: 4
  by_user_tier:
    free: 2
    pro: 4
    enterprise: 4
auto_fallback:
  enabled: true
  tool_id: lexical_retrieval
  top_k: 10
temperature: 0.3
