mode: rag
system_prompt_base: prompts/orchestrators/rag-system.md
tool_pool: []
inject_retrieval_query: true
skill_catalog:
  retrieve: [codegen, memory]
  synthesis: [writing, format]
  mandatory:
    retrieve: [codegen]
    synthesis: [rag-answer]
budget:
  max_iterations: 4
  by_user_tier:
    free: 2
    pro: 4
    enterprise: 4
auto_fallback:
  enabled: true
  tool_id: dense_retrieval
  top_k: 10
temperature: 0.3
query_normalization:
  enabled: true
  max_prior_turns: 6
  llm_fallback: true
loop_exit:
  require_evidence: true
  allow_content_early_stop: false
  skip_synthesis_on_direct_answer: false
synthesis_output:
  contract: internal_answer_v1
