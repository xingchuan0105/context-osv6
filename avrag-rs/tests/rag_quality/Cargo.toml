[package]
name = "rag_quality"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[[bin]]
name = "quality_runner"
path = "src/bin/quality_runner.rs"

[[bin]]
name = "judge_calibration"
path = "src/bin/judge_calibration.rs"

[dependencies]
# Core RAG dependencies (for integration testing against real runtime)
avrag-rag-core = { path = "../../crates/rag-core" }
common = { path = "../../crates/common" }
avrag-llm = { path = "../../crates/llm" }
# Shared wire types — needed to extract retrieval/citation chunks from ChatResponse
contracts = { path = "../../../contracts" }

# Evaluation / metrics
serde.workspace = true
serde_json.workspace = true
regex.workspace = true
once_cell.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
async-trait.workspace = true

# Async
tokio.workspace = true
futures = "0.3"

# HTTP client for DashScope LLM + embedding
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# For golden set management
thiserror.workspace = true
anyhow.workspace = true

[dev-dependencies]
avrag-storage-pg = { path = "../../crates/storage-pg" }
