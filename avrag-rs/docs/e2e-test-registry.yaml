# E2E Test Registry — machine-readable index for TEAF
# See: docs/e2e-analysis-framework.md
# Regenerate: ./scripts/generate-e2e-test-registry.py

schema_version: 1
generated_test_count: 102

capability_domains:
  CAP-CHAT:
    name: 通用对话
    required_layers: [L1, L3, L5]
  CAP-RAG:
    name: 文档问答
    required_layers: [L1, L2, L3, L4, L5]
  CAP-SEARCH:
    name: 联网搜索
    required_layers: [L1, L2, L3, L4, L5]
  CAP-INGEST:
    name: 入库解析
    required_layers: [L1, L2, L3]
  CAP-STREAM:
    name: 流式可观测
    required_layers: [L2, L6]
  CAP-MEMORY:
    name: 多轮记忆
    required_layers: [L1, L3]
  CAP-FORMAT:
    name: 格式输出
    required_layers: [L2, L3, L4]
  CAP-AUTH:
    name: 认证边界
    required_layers: [L1, L6]
  CAP-SHARE:
    name: 协作分享
    required_layers: [L1, L5]
  CAP-BILLING:
    name: 计费同意
    required_layers: [L1, L5]
  CAP-TENANT:
    name: 租户隔离
    required_layers: [L2]
  CAP-DEGRADE:
    name: 降级韧性
    required_layers: [L2]
  CAP-WRITE:
    name: 长文写作
    # L1=mock smoke write_smoke (W1), L3=llm_real write_real, L5=UI journey workspace-write (W2)
    required_layers: [L1, L3, L5]

smoke_module_lists:
  # Keep in sync with avrag-rs/scripts/run-product-smoke-e2e.sh NON_RAG_MODULES.
  non_rag: [chat_smoke, search_smoke, write_smoke, auth_boundary, share_boundary, workspace_crud, billing_boundary]
  rag_serial: [ingestion_smoke, rag_smoke, rag_fallback_smoke, rag_codegen_multitool_smoke, memory_multiturn_smoke, paddle_image_smoke]
  manual_only: [search_real_smoke, paddle_pdf_smoke]

