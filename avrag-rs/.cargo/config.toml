include = [{ path = "local-machine.toml", optional = true }]

# Cap rustc parallelism for WSL / ~16G RAM. Full-core default thrashs multi-GB targets.
# Override: CARGO_BUILD_JOBS=N  or  local-machine.toml  [build] jobs = N
[build]
jobs = 2

[alias]
test-app = ["test", "-p", "app", "--message-format=short"]
