[package]
name = "transport-http"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
anyhow.workspace = true
analytics = { path = "../analytics" }
avrag-auth = { path = "../auth" }
avrag-billing = { path = "../billing" }
