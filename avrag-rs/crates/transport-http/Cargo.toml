[package]
name = "transport-http"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
anyhow.workspace = true
analytics = { path = "../analytics" }
avrag-auth = { path = "../auth" }
avrag-billing = { path = "../billing" }
avrag-licensing = { path = "../licensing" }
avrag-share = { path = "../share" }
app-bootstrap = { path = "../app-bootstrap" }
app-chat = { path = "../app-chat" }
app-core = { path = "../app-core" }
telemetry = { path = "../telemetry" }
async-stream.workspace = true
axum.workspace = true
utoipa.workspace = true
utoipa-swagger-ui = { version = "9", features = ["axum"] }
bcrypt = "0.15"
chrono.workspace = true
common = { path = "../common" }
contracts = { path = "../../../contracts" }
hex.workspace = true
jsonwebtoken = "9"
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
tokio.workspace = true
tower = { workspace = true, features = ["util"] }
tower-http.workspace = true
tracing.workspace = true
uuid.workspace = true
tokio-util.workspace = true
lettre = { version = "0.11", default-features = false, features = ["builder", "smtp-transport", "tokio1-native-tls"] }

[dev-dependencies]
app-bootstrap = { path = "../app-bootstrap", features = ["test-support"] }
async-trait.workspace = true
http-body-util = "0.1"
sqlx = { version = "0.8", default-features = false, features = ["postgres", "runtime-tokio", "uuid"] }
