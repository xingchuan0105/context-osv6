[package]
name = "avrag-storage-pg"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
contracts = { path = "../../../contracts" }
anyhow.workspace = true
async-trait.workspace = true
# Keep on major "1"; Cargo.lock is tracked so CI stays reproducible.
aws-config = "1"
aws-credential-types = "1"
aws-sdk-s3 = "1"
base64 = "0.22"
bytes = "1"
chrono.workspace = true
common = { path = "../common" }
futures = "0.3"
hex.workspace = true
ingestion-types = { path = "../ingestion-types" }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
sqlx = { version = "0.8", default-features = false, features = ["postgres", "runtime-tokio", "uuid", "chrono", "json", "migrate"] }
thiserror.workspace = true
tracing.workspace = true
tokio.workspace = true
uuid.workspace = true
sea-query.workspace = true

[dev-dependencies]
ingestion = { path = "../ingestion" }
