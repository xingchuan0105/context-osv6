name: Smoke E2E

on:
  pull_request:
    paths:
      - 'crates/**'
      - 'bins/**'
      - 'prompts/**'
      - 'contracts/**'
      - '.github/workflows/smoke-e2e.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  smoke-e2e:
    name: Product Smoke E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-smoke-${{ hashFiles('**/Cargo.lock') }}

      - name: Start Milvus stack
        run: |
          COMPOSE_FILE="$(find . -path '*/docker-compose.milvus.yml' -print -quit)"
          if [ -z "$COMPOSE_FILE" ]; then
            echo "docker-compose.milvus.yml not found" >&2
            exit 1
          fi
          docker compose -f "$COMPOSE_FILE" up -d --wait

      - name: Clean orphaned E2E containers
        run: |
          docker ps -a --filter name=avrag-test-pg --format '{{.Names}}' | xargs -r docker rm -f
          docker ps -a --filter name=avrag-test-milvus --format '{{.Names}}' | xargs -r docker rm -f
          docker ps -a --filter name=avrag-test-redis --format '{{.Names}}' | xargs -r docker rm -f

      - name: Compile tests
        run: cargo test --no-run --test product_e2e -p app

      - name: Run PR smoke E2E
        run: ./scripts/run-product-smoke-e2e.sh
        timeout-minutes: 15

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: crates/app/tests/e2e_output/**/**
          retention-days: 7
