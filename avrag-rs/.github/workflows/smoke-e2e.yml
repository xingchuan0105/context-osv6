name: Smoke E2E

on:
  pull_request:
    paths:
      - 'crates/**'
      - 'bins/**'
      - 'prompts/**'
      - 'contracts/**'
      - '.github/workflows/smoke-e2e.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  smoke-e2e:
    name: Product Smoke E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-smoke-${{ hashFiles('**/Cargo.lock') }}

      - name: Compile tests
        run: cargo test --no-run --test product_e2e -p app

      - name: Run Smoke E2E
        run: cargo test --test product_e2e -- --nocapture
        env:
          E2E_MODE: smoke
        timeout-minutes: 15

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: crates/app/tests/e2e_output/**/**
          retention-days: 7
