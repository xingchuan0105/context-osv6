name: Frontend Unit Tests

on:
  pull_request:
    paths:
      - 'frontend_next/**'
      - '.github/workflows/frontend-unit.yml'
  workflow_dispatch:

env:
  CI: true

jobs:
  vitest:
    name: Frontend Vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_next
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend_next/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test run
