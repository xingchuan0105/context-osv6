name: Nightly LLM Real E2E

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  llm-real-e2e:
    name: Product E2E (real LLM)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: avrag-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('avrag-rs/**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('avrag-rs/**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: avrag-rs/target
          key: ${{ runner.os }}-cargo-build-llm-real-${{ hashFiles('avrag-rs/**/Cargo.lock') }}

      - name: Run llm_real E2E
        run: cargo test -p app --test product_e2e llm_real -- --ignored --test-threads=1 --nocapture
        env:
          E2E_MODE: nightly
          AGENT_LLM_BASE_URL: ${{ secrets.AGENT_LLM_BASE_URL }}
          AGENT_LLM_API_KEY: ${{ secrets.AGENT_LLM_API_KEY }}
          AGENT_LLM_MODEL: ${{ secrets.AGENT_LLM_MODEL }}
          MEMORY_LLM_BASE_URL: ${{ secrets.MEMORY_LLM_BASE_URL }}
          MEMORY_LLM_API_KEY: ${{ secrets.MEMORY_LLM_API_KEY }}
          MEMORY_LLM_MODEL: ${{ secrets.MEMORY_LLM_MODEL }}
          INGESTION_LLM_BASE_URL: ${{ secrets.INGESTION_LLM_BASE_URL }}
          INGESTION_LLM_API_KEY: ${{ secrets.INGESTION_LLM_API_KEY }}
          INGESTION_LLM_MODEL: ${{ secrets.INGESTION_LLM_MODEL }}
          EMBEDDING_BASE_URL: ${{ secrets.EMBEDDING_BASE_URL }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
          SEARCH_REQUIRE_REAL: '1'
        timeout-minutes: 55

      - name: Upload llm_real artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-real-e2e-${{ github.run_id }}
          path: avrag-rs/crates/app/tests/e2e_output/llm_real/**/**
          retention-days: 90

      - name: Summary
        if: always()
        working-directory: avrag-rs
        run: |
          echo "## Nightly llm_real E2E" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d crates/app/tests/e2e_output/llm_real ]; then
            echo "Artifact directories:" >> $GITHUB_STEP_SUMMARY
            find crates/app/tests/e2e_output/llm_real -name metadata.json | head -20 >> $GITHUB_STEP_SUMMARY
          else
            echo "No llm_real artifacts found." >> $GITHUB_STEP_SUMMARY
          fi
