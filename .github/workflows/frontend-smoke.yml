name: Frontend Smoke E2E

# Temporary: not on pull_request. Architecture/product surface is moving (ADR 0006);
# Playwright smoke is re-stabilized after feature work, not as a merge gate.
# Run manually via workflow_dispatch until then.
on:
  workflow_dispatch:

env:
  CI: true

jobs:
  smoke-e2e:
    name: Frontend Smoke E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_next
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: frontend_next/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            avrag-rs/target
          key: ${{ runner.os }}-cargo-smoke-${{ hashFiles('avrag-rs/**/Cargo.lock') }}

      - name: Start Milvus stack
        # functional smoke does not run upload -> RAG yet, but the Playwright
        # webServer still boots avrag-api, which connects to Milvus on startup;
        # having Milvus ready keeps the backend health check stable and benefits
        # future smoke specs that exercise RAG.
        run: bash "$GITHUB_WORKSPACE/scripts/ci-start-milvus.sh"
        timeout-minutes: 5

      # Cold `cargo run` exceeds Playwright's 120s webServer budget on 2-core runners.
      - name: Prebuild Rust API and worker
        working-directory: avrag-rs
        run: cargo build --locked -p avrag-api -p avrag-worker
        timeout-minutes: 25

      - name: Run smoke E2E
        run: pnpm exec playwright test --project=functional --project=auth
        env:
          E2E_RESET_SECRET: ${{ secrets.E2E_RESET_SECRET }}
        timeout-minutes: 15

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: frontend_next/playwright-report/
          retention-days: 3
