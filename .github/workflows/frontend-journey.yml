name: Frontend Journey E2E

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend_next/**'
      - 'avrag-rs/**'
      - '.github/workflows/frontend-journey.yml'
  workflow_dispatch:

env:
  CI: true

jobs:
  journey-e2e:
    name: Frontend Journey E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_next
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend_next/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            avrag-rs/target
          key: ${{ runner.os }}-cargo-journey-${{ hashFiles('avrag-rs/**/Cargo.lock') }}

      - name: Pre-build Rust backend
        # Playwright webServer runs `cargo run --bin avrag-api` / `cargo run -p avrag-worker`
        # with a 120s readiness timeout. On a cold CI (cargo cache miss) the workspace
        # build takes far longer than 120s, so the webServer times out before avrag-api
        # serves /health and every spec fails. Pre-build here (cached by actions/cache) so
        # `cargo run` is a no-op build inside Playwright and starts within the timeout.
        working-directory: avrag-rs
        run: cargo build -p avrag-api -p avrag-worker
        timeout-minutes: 20

      - name: Start Milvus stack
        # journey specs include upload -> RAG; the Playwright webServer (avrag-api)
        # connects to Milvus on startup, so Milvus must be ready before tests run.
        # Script resolves its own path -> avrag-rs/docker-compose.milvus.yml.
        run: bash "$GITHUB_WORKSPACE/scripts/ci-start-milvus.sh"
        timeout-minutes: 5

      - name: Start Postgres
        # globalSetup reset-user-data + ensureTestUserAccount hit the `users` table;
        # worker auto-runs sqlx migrations on boot. Mirror integration-e2e's avrag-ci-pg.
        # playwright.config.ts CI branch forwards process.env.DATABASE_URL to the
        # avrag-api/avrag-worker webServer env.
        run: |
          docker run -d --rm --name avrag-ci-pg \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=test \
            -p 5432:5432 \
            postgres:16-alpine
          for i in $(seq 1 30); do
            if docker exec avrag-ci-pg pg_isready -U test -d test >/dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to become ready" >&2
          exit 1

      - name: Run journey E2E
        run: pnpm exec playwright test --project=journey
        env:
          E2E_RESET_SECRET: ${{ secrets.E2E_RESET_SECRET }}
          DATABASE_URL: postgres://test:test@127.0.0.1:5432/test
          # RAG journey specs (upload-rag, citation-interaction) need real embedding
          # + ingestion/answer LLM keys. avrag-rs/.env is gitignored, so inject 3 repo
          # secrets here; webServerEnv forwards process env to avrag-api/worker. Base
          # URLs/models fall back to config.rs defaults (which match the working .env),
          # except AGENT_LLM_MODEL whose default is deepseek-v4-pro — override to
          # deepseek-v4-flash to match local. Requires repo secrets: DASHSCOPE_API_KEY,
          # DMX_API_KEY, DEEPSEEK_API_KEY.
          EMBEDDING_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          MM_EMBEDDING_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          MM_RERANK_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          RERANK_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          INGESTION_LLM_API_KEY: ${{ secrets.DMX_API_KEY }}
          AGENT_LLM_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AGENT_LLM_MODEL: deepseek-v4-flash
          MEMORY_LLM_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        timeout-minutes: 45

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-journey-report
          path: |
            frontend_next/playwright-report/
            frontend_next/test-results/
          retention-days: 7

  billing-e2e:
    name: Frontend Billing E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_next
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend_next/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            avrag-rs/target
          key: ${{ runner.os }}-cargo-billing-${{ hashFiles('avrag-rs/**/Cargo.lock') }}

      - name: Pre-build Rust backend
        # Same cold-build webServer timeout issue as journey-e2e: Playwright starts
        # avrag-api/avrag-worker via `cargo run` with a 120s readiness timeout, which a
        # cold workspace build far exceeds. Pre-build here so `cargo run` is a no-op.
        working-directory: avrag-rs
        run: cargo build -p avrag-api -p avrag-worker
        timeout-minutes: 20

      - name: Start Postgres
        # globalSetup reset-user-data + ensureTestUserAccount need the `users` table;
        # worker auto-runs sqlx migrations on boot. Mirror integration-e2e's avrag-ci-pg.
        run: |
          docker run -d --rm --name avrag-ci-pg \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=test \
            -p 5432:5432 \
            postgres:16-alpine
          for i in $(seq 1 30); do
            if docker exec avrag-ci-pg pg_isready -U test -d test >/dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to become ready" >&2
          exit 1

      - name: Run billing E2E
        run: |
          pnpm exec playwright test --project=billing \
            e2e/specs/billing/paywall-flow.spec.ts \
            e2e/specs/billing/usage-dashboard.spec.ts
        env:
          E2E_RESET_SECRET: ${{ secrets.E2E_RESET_SECRET }}
          DATABASE_URL: postgres://test:test@127.0.0.1:5432/test
          # Billing specs (paywall / usage-dashboard) don't use RAG. Disable RAG so
          # avrag-api/worker boot without an embedding client or Milvus connection
          # (app-bootstrap gates rag_runtime on enable_rag; worker gates
          # build_worker_retrieval_data_plane the same way). No Milvus step needed.
          AVRAG_ENABLE_RAG: 'false'
          PRICING_REVAMP_ROLLOUT: '100'
          NEXT_PUBLIC_PRICING_REVAMP_ENABLED: '1'
        timeout-minutes: 30

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-billing-report
          path: |
            frontend_next/playwright-report/
            frontend_next/test-results/
          retention-days: 7
