name: Frontend Skills Nightly E2E

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CI: true

jobs:
  skills-e2e:
    name: Frontend Skills Nightly E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_next
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend_next/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            avrag-rs/target
          key: ${{ runner.os }}-cargo-skills-${{ hashFiles('avrag-rs/**/Cargo.lock') }}

      - name: Start Milvus stack
        # skills specs assert hard citations over real RAG/Search; the Playwright
        # webServer (avrag-api) connects to Milvus on startup, so Milvus must be
        # ready before tests run.
        run: bash "$GITHUB_WORKSPACE/scripts/ci-start-milvus.sh"
        timeout-minutes: 5

      - name: Run skills E2E
        run: pnpm exec playwright test --project=skills
        env:
          E2E_RESET_SECRET: ${{ secrets.E2E_RESET_SECRET }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          E2E_LLM_BASE_URL: ${{ secrets.E2E_LLM_BASE_URL }}
          E2E_LLM_API_KEY: ${{ secrets.E2E_LLM_API_KEY }}
        timeout-minutes: 45

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-skills-report
          path: frontend_next/playwright-report/
          retention-days: 14
