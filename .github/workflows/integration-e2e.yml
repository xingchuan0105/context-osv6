name: Integration E2E

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'avrag-rs/crates/**'
      - 'avrag-rs/bins/**'
      - 'avrag-rs/prompts/**'
      - 'avrag-rs/scripts/**'
      - 'contracts/**'
      - '.github/workflows/integration-e2e.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  integration-e2e:
    name: Product Integration E2E (full suite)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: avrag-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # RESTORE-ONLY (`actions/cache/restore@v4`, no post-save): plain `actions/cache@v4`
      # post-save fails on this workspace — both `avrag-rs/target` and `~/.cargo/git` exceed
      # the 10GB cache limit, turning the job red even when all tests pass (observed
      # 2026-06-29: steps 10-12 SUCCESS, Post Cache build/index FAILED). restore@v4 has no
      # post-save step → no save can fail. `avrag-rs/target` is not restored (also >10GB) →
      # cold compile each run (~15min, within the 45min job timeout).
      - name: Restore cargo registry
        uses: actions/cache/restore@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('avrag-rs/**/Cargo.lock') }}

      - name: Restore cargo index
        uses: actions/cache/restore@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('avrag-rs/**/Cargo.lock') }}
      - name: Start Milvus stack
        run: |
          COMPOSE_FILE="$(find . -path '*/docker-compose.milvus.yml' -print -quit)"
          if [ -z "$COMPOSE_FILE" ]; then
            echo "docker-compose.milvus.yml not found" >&2
            exit 1
          fi
          docker compose -f "$COMPOSE_FILE" up -d --wait

      - name: Clean orphaned E2E containers
        run: |
          # Test-owned ephemeral names only (matches setup::cleanup_orphaned_test_containers).
          # Milvus uses docker-compose (milvus-standalone); not force-removed — collection
          # isolation uses MILVUS_COLLECTION_PREFIX + teardown drops, not dedicated containers.
          docker ps -a --filter name=avrag-test-pg --format '{{.Names}}' | xargs -r docker rm -f
          docker ps -a --filter name=avrag-test-redis --format '{{.Names}}' | xargs -r docker rm -f

      - name: Start Postgres for legal contract tests
        run: |
          docker run -d --rm --name avrag-ci-pg \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=test \
            -p 5432:5432 \
            postgres:16-alpine
          for i in $(seq 1 30); do
            if docker exec avrag-ci-pg pg_isready -U test -d test >/dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to become ready" >&2
          exit 1

      - name: Compile tests
        run: |
          cargo test --no-run --test product_e2e -p app --features product-e2e
          cargo test --no-run -p transport-http

      # --test-threads=1: required for module-scoped fixtures (e.g. streaming_chat::shared_rag_fixture)
      - name: Run transport-http contract tests
        run: cargo test -p transport-http
        env:
          DATABASE_URL: postgres://test:test@127.0.0.1:5432/test

      - name: Run full Product E2E suite
        run: cargo test --test product_e2e -p app --features product-e2e -- --test-threads=1 --nocapture
        env:
          E2E_MODE: integration
        timeout-minutes: 40

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-e2e-failure-${{ github.run_id }}
          path: avrag-rs/crates/app/tests/e2e_output/**/**
          retention-days: 14
