name: License Check

on:
  pull_request:
    paths:
      - 'avrag-rs/**/Cargo.toml'
      - 'avrag-rs/**/Cargo.lock'
      - 'frontend_next/package.json'
      - 'frontend_next/pnpm-lock.yaml'
      - 'contracts/Cargo.toml'
      - 'scripts/check-licenses.sh'
      - 'scripts/generate-third-party-notices.sh'
  push:
    branches: [master]
    paths:
      - 'avrag-rs/**/Cargo.toml'
      - 'avrag-rs/**/Cargo.lock'
      - 'frontend_next/package.json'
      - 'frontend_next/pnpm-lock.yaml'
      - 'contracts/Cargo.toml'
      - 'scripts/check-licenses.sh'
      - 'scripts/generate-third-party-notices.sh'
  workflow_dispatch:

jobs:
  license-gate:
    name: Third-party license gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-license
        run: cargo install cargo-license --locked

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Run license gate
        run: ./scripts/check-licenses.sh
