name: License Check

on:
  pull_request:
    paths:
      - 'avrag-rs/**/Cargo.toml'
      - 'avrag-rs/**/Cargo.lock'
      - 'frontend_next/package.json'
      - 'frontend_next/pnpm-lock.yaml'
      - 'contracts/Cargo.toml'
      - 'scripts/check-licenses.sh'
      - 'scripts/generate-third-party-notices.sh'
      - 'scripts/sync-legal-assets.sh'
      - 'scripts/check-legal-publish-gate.sh'
      - 'scripts/verify-legal-p0.sh'
      - 'frontend_next/components/legal/**'
      - 'frontend_next/lib/legal/**'
      - 'avrag-rs/crates/transport-http/**'
      - 'avrag-rs/crates/app-core/src/legal_versions.rs'
      - 'avrag-rs/migrations/*legal*'
      - 'THIRD_PARTY_NOTICES.md'
      - 'LICENSE'
      - 'frontend_next/content/legal/**'
  push:
    branches: [master]
    paths:
      - 'avrag-rs/**/Cargo.toml'
      - 'avrag-rs/**/Cargo.lock'
      - 'frontend_next/package.json'
      - 'frontend_next/pnpm-lock.yaml'
      - 'contracts/Cargo.toml'
      - 'scripts/check-licenses.sh'
      - 'scripts/generate-third-party-notices.sh'
      - 'scripts/sync-legal-assets.sh'
      - 'scripts/check-legal-publish-gate.sh'
      - 'scripts/verify-legal-p0.sh'
      - 'frontend_next/components/legal/**'
      - 'frontend_next/lib/legal/**'
      - 'avrag-rs/crates/transport-http/**'
      - 'avrag-rs/crates/app-core/src/legal_versions.rs'
      - 'avrag-rs/migrations/*legal*'
      - 'THIRD_PARTY_NOTICES.md'
      - 'LICENSE'
      - 'frontend_next/content/legal/**'
  workflow_dispatch:

jobs:
  license-gate:
    name: Third-party license gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-license
        run: cargo install cargo-license --locked

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Run license gate
        run: ./scripts/check-licenses.sh

  notice-drift:
    name: NOTICE drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Sync legal assets
        run: bash scripts/sync-legal-assets.sh

      - name: Check THIRD_PARTY_NOTICES.md has no drift
        run: |
          if ! diff -q THIRD_PARTY_NOTICES.md frontend_next/public/legal/third-party-notices.md > /dev/null 2>&1; then
            echo "::error::THIRD_PARTY_NOTICES.md and frontend_next/public/legal/third-party-notices.md are out of sync."
            echo "Run 'cd frontend_next && pnpm sync:legal' locally and commit the result."
            diff THIRD_PARTY_NOTICES.md frontend_next/public/legal/third-party-notices.md || true
            exit 1
          fi
          echo "✅ NOTICE files are in sync"

      - name: Check LICENSE has no drift
        run: |
          if ! diff -q LICENSE frontend_next/public/legal/LICENSE > /dev/null 2>&1; then
            echo "::error::LICENSE and frontend_next/public/legal/LICENSE are out of sync."
            echo "Run 'cd frontend_next && pnpm sync:legal' locally and commit the result."
            exit 1
          fi
          echo "✅ LICENSE files are in sync"

  legal-publish-gate:
    name: Legal publish gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check legal document publish status
        run: bash scripts/check-legal-publish-gate.sh

  legal-p0-verify:
    name: Legal P0 acceptance checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Run verify-legal-p0.sh
        run: bash scripts/verify-legal-p0.sh
