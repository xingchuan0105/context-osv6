name: Smoke E2E

on:
  pull_request:
    paths:
      - 'avrag-rs/crates/**'
      - 'avrag-rs/bins/**'
      - 'avrag-rs/prompts/**'
      - 'avrag-rs/scripts/**'
      - 'contracts/**'
      - 'desktop/**'
      - '.github/workflows/smoke-e2e.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Do not set RUSTFLAGS=-D warnings here: smoke compiles many crates with
  # pre-existing dead_code / deprecated notes in serde DTOs and desktop shell.
  # Treat warning-as-error in a dedicated lint job instead.

jobs:
  smoke-e2e:
    name: Product Smoke E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: avrag-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('avrag-rs/**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('avrag-rs/**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: avrag-rs/target
          key: ${{ runner.os }}-cargo-build-smoke-${{ hashFiles('avrag-rs/**/Cargo.lock') }}

      - name: Start Milvus stack
        run: |
          COMPOSE_FILE="$(find . -path '*/docker-compose.milvus.yml' -print -quit)"
          if [ -z "$COMPOSE_FILE" ]; then
            echo "docker-compose.milvus.yml not found" >&2
            exit 1
          fi
          docker compose -f "$COMPOSE_FILE" up -d --wait

      - name: Clean orphaned E2E containers
        run: |
          # Test-owned ephemeral names only (matches setup::cleanup_orphaned_test_containers).
          # Milvus uses docker-compose (milvus-standalone); not force-removed — collection
          # isolation uses MILVUS_COLLECTION_PREFIX + teardown drops, not dedicated containers.
          docker ps -a --filter name=avrag-test-pg --format '{{.Names}}' | xargs -r docker rm -f
          docker ps -a --filter name=avrag-test-redis --format '{{.Names}}' | xargs -r docker rm -f
          docker ps -a --filter name=avrag-ci-pg --format '{{.Names}}' | xargs -r docker rm -f

      - name: Start Postgres for legal contract tests
        run: |
          docker run -d --rm --name avrag-ci-pg \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=test \
            -p 5432:5432 \
            postgres:16-alpine
          for i in $(seq 1 30); do
            if docker exec avrag-ci-pg pg_isready -U test >/dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to become ready" >&2
          exit 1

      - name: Compile tests
        run: |
          cargo test --locked --no-run --test product_e2e -p app --features product-e2e
          cargo test --locked --no-run -p transport-http

      - name: Run transport-http contract tests
        run: cargo test --locked -p transport-http
        env:
          DATABASE_URL: postgres://test:test@127.0.0.1:5432/test

      - name: Run PR smoke E2E
        run: ./scripts/run-product-smoke-e2e.sh
        timeout-minutes: 15

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: avrag-rs/crates/app/tests/e2e_output/**/**
          retention-days: 7

  desktop-check:
    name: Desktop Shell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Tauri / glib)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl wget file libssl-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-desktop-${{ hashFiles('desktop/src-tauri/Cargo.lock', 'avrag-rs/**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-desktop-${{ hashFiles('desktop/src-tauri/Cargo.lock', 'avrag-rs/**/Cargo.lock') }}

      # tauri::generate_context! requires frontendDist path to exist.
      - name: Ensure Tauri frontendDist path
        run: mkdir -p frontend_next/out && printf '%s\n' '<!doctype html><title>desktop-ci</title>' > frontend_next/out/index.html

      - name: Cargo test desktop
        run: cargo test --manifest-path desktop/src-tauri/Cargo.toml --quiet
